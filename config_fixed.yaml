---
# General settings
general:
  n_available_cpu: 6
  broker_image: mininetfed:broker
  experiments_folder: experiments

# Experiment settings
experiment:
  new_experiment: True
  experiment_name: experimento_video
  trainer_mode: client
  max_n_rounds: 50
  stop_accuracy: 0.93
  min_trainers: 3

# Network settings
network:
  network_monitor_script: network_monitor.py
  network_monitor_image: mininetfed:clientc
  network_components: 1
  connections:
    - connection1: 1
      connection2: 2
      loss: 0
      delay: 0ms
      bw: 100  # Increased bandwidth to avoid potential bottlenecks

# Server settings
server:
  memory: 512m  # Increased memory
  vCPU_percent: 30  # Increased CPU
  image: mininetfed:clientc
  connection: 1
  script: server/server.py

# Clients settings list
client_types:
  - amount: 3  # Reduced number of clients to test
    name: tipo1
    memory: 512m  # Increased memory
    vCPU_percent: 20  # Increased CPU
    image: mininetfed:clientc
    script: client/client.py
    connection: 1
    loss: 0
    delay: 0ms
    bw: 100  # Increased bandwidth

  - amount: 1
    name: tipo2
    memory: 512m  # Increased memory
    vCPU_percent: 20  # Increased CPU
    image: mininetfed:clientc
    script: client/client.py
    connection: 1
    loss: 0
    delay: 0ms
    bw: 100  # Increased bandwidth